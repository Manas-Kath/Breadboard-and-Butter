<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cozy Deck • Bunty Smart Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-url: url('https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=2070');
            --glass-bg: rgba(255, 255, 255, 0.03);
            --accent-amber: #ff9800;
            --text-gold: #e4d4bc;
            --text-dim: #a89a85;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; -webkit-user-select: none; user-select: none; }
        
        body {
            background: var(--bg-url) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-gold);
        }

        /* The Main Refractive Glass Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(140%);
            -webkit-backdrop-filter: blur(25px) saturate(140%);
            border-radius: 40px;
            width: 85vw;
            height: 80vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            
            /* Refractive Highlights based on Top-Left Light Source */
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 2px solid rgba(0, 0, 0, 0.5);
            border-right: 2px solid rgba(0, 0, 0, 0.5);
        }

        /* Top-Left Soft Light Reflection Overlay */
        .glass-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 45%);
            border-radius: 40px;
            pointer-events: none;
        }

        .header-controls { position: absolute; top: 2rem; right: 2.5rem; z-index: 100; }
        .icon-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; opacity: 0.6; color: var(--text-gold); transition: 0.3s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        /* Typography & Layout */
        #clock {
            font-family: 'Playfair Display', serif;
            font-size: 11rem;
            line-height: 0.8;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        #date { text-transform: uppercase; letter-spacing: 8px; font-size: 1.1rem; color: var(--text-dim); margin-bottom: 3.5rem; }

        /* Inset Control Grid */
        .grid {
            background: rgba(0,0,0,0.3);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            box-shadow: inset 4px 4px 12px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .tile {
            width: 95px; height: 115px; margin: 0 12px;
            border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(45, 30, 30, 0.4);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tile.active {
            background: rgba(255, 152, 0, 0.1);
            border-color: var(--accent-amber);
            box-shadow: 0 0 25px rgba(255, 152, 0, 0.3), inset 0 0 10px rgba(255, 152, 0, 0.2);
            transform: translateY(-3px);
        }
        .tile .icon { font-size: 2.2rem; margin-bottom: 8px; filter: grayscale(1) opacity(0.5); }
        .tile.active .icon { filter: grayscale(0) opacity(1) drop-shadow(0 0 8px var(--accent-amber)); }
        .tile .label { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }

        /* Stats Capsule */
        .stats-pill {
            margin-top: 3.5rem; background: rgba(0,0,0,0.3);
            padding: 12px 35px; border-radius: 50px;
            display: flex; gap: 40px; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 300; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }

        /* Sticky Notes & 3D Pin */
        .notes-container { position: fixed; left: 4rem; top: 4rem; z-index: 200; pointer-events: none; }
        .sticky-note {
            background: #fdf2d0; color: #4b3621; width: 220px;
            padding: 35px 20px 20px; box-shadow: 12px 12px 35px rgba(0,0,0,0.5);
            transform: rotate(-3deg); border-radius: 2px;
            margin-bottom: 2.5rem; pointer-events: auto; position: relative; text-align: center;
        }
        /* Realistic 3D Red Pushpin */
        .sticky-note::before {
            content: ''; position: absolute; top: 10px; left: 50%;
            width: 18px; height: 18px;
            background: radial-gradient(circle at 35% 35%, #ff5f5f, #a00000);
            border-radius: 50%; transform: translateX(-50%);
            box-shadow: 2px 4px 6px rgba(0,0,0,0.4), inset -2px -2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Frosted Music Panel */
        .media-glass {
            position: fixed; bottom: 3rem; right: 4rem;
            background: rgba(20, 15, 15, 0.6);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.25); /* Specular edge */
            border-radius: 35px; padding: 22px; display: flex;
            align-items: center; width: 400px; z-index: 100;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .album-art { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: #222; margin-right: 22px; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.2); overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-amber); width: 0%; box-shadow: 0 0 12px var(--accent-amber); transition: width 1s linear; }

        /* Toast notifications */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent-amber); color: #fff; padding: 12px 30px; border-radius: 40px; opacity: 0; z-index: 1000; font-weight: 600; }
        .toast.show { opacity: 1; bottom: 50px; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div class="notes-container" id="notes"></div>

    <div class="glass-panel">
        <div class="header-controls">
            <button class="icon-btn" onclick="openM()">⚙️</button>
        </div>

        <div id="clock">00:00</div>
        <div id="date">Welcome Home</div>

        <div class="grid">
            <div class="tile" id="r1" onclick="t(1)"><div class="icon">🔌</div><div class="label">Charger</div></div>
            <div class="tile" id="r2" onclick="t(2)"><div class="icon">💡</div><div class="label">Lamp</div></div>
            <div class="tile" id="r3" onclick="t(3)"><div class="icon">🔋</div><div class="label">Outlet</div></div>
            <div class="tile" id="r4" onclick="t(4)"><div class="icon">🌬️</div><div class="label">Fan</div></div>
            <div class="tile" id="r5" onclick="t(5)"><div class="icon">💻</div><div class="label">Work</div></div>
        </div>

        <div class="stats-pill">
            <div class="stat-item"><span class="stat-label">Temp</span><span id="tDisp">--°</span></div>
            <div class="stat-item">☕</div>
            <div class="stat-item"><span class="stat-label">Humi</span><span id="hDisp">--%</span></div>
        </div>
    </div>

    <div class="media-glass">
        <div class="album-art" id="media-art"><img src="" id="art-img" style="display:none;"></div>
        <div style="flex-grow: 1;">
            <div id="sStatus" style="font-weight: 700; font-size: 1rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;">Offline</div>
            <div style="font-size: 0.75rem; color: var(--text-dim);">Spotify • <span id="sBat">--%</span></div>
            <div class="progress-container"><div id="sBar" class="progress-fill"></div></div>
        </div>
        <div style="display: flex; gap: 12px; margin-left: 15px;">
            <button class="icon-btn" onclick="mediaCmd('prev')" style="font-size: 1.4rem;">⏮</button>
            <button class="icon-btn" onclick="mediaCmd('toggle')" style="font-size: 1.4rem;">⏯</button>
            <button class="icon-btn" onclick="mediaCmd('next')" style="font-size: 1.4rem;">⏭</button>
        </div>
    </div>

    <script>
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'toast show';
            setTimeout(function() { t.className = 'toast'; }, 3000);
        }

        var cfg = { 
            h: localStorage.getItem('mq_h') || "100.125.241.104", 
            p: parseInt(localStorage.getItem('mq_p')) || 9001 
        };

        var cli = new Paho.MQTT.Client(cfg.h, cfg.p, "MochaUI_" + Math.random().toString(16).slice(2, 6));

        function updateClock() {
            var n = new Date();
            var h = n.getHours().toString().padStart(2, '0');
            var m = n.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = h + ":" + m;
            document.getElementById('date').innerText = n.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000); 
        updateClock();

        function t(id) {
            if (!cli.isConnected()) { showToast("Not connected"); return; }
            var el = document.getElementById('r' + id);
            var val = el.className.indexOf('active') !== -1 ? "OFF" : "ON";
            var m = new Paho.MQTT.Message(val);
            m.destinationName = "room/switch/relay_" + id + "/command";
            m.retained = true;
            cli.send(m);
        }

        function mediaCmd(cmd) {
            if (!cli.isConnected()) return;
            var m = new Paho.MQTT.Message(cmd.toUpperCase());
            m.destinationName = "room/media/command";
            cli.send(m);
        }

        cli.onConnectionLost = function(e) { 
            showToast("Connection Lost...");
            setTimeout(function() { cli.connect({ onSuccess: onConn, useSSL: false }); }, 5000);
        };

        function onConn() { 
            cli.subscribe("room/#"); 
            showToast("Connected to Mocha Hub"); 
        }

        cli.onMessageArrived = function(m) {
            var topic = m.destinationName;
            var payload = m.payloadString;
            
            if(topic.indexOf("relay_") !== -1) {
                var match = topic.match(/relay_(\d)/);
                if (match) {
                    var el = document.getElementById('r'+match[1]);
                    el.className = (payload === "ON") ? "tile active" : "tile";
                }
            }
            if(topic === "room/sensor/temp/state") document.getElementById('tDisp').innerText = Math.round(parseFloat(payload)) + "°";
            if(topic === "room/sensor/humi/state") document.getElementById('hDisp').innerText = Math.round(parseFloat(payload)) + "%";
            
            if(topic === "room/media/status") {
                try {
                    var data = JSON.parse(payload);
                    document.getElementById('sStatus').innerText = data.title || "Nothing Playing";
                    var artImg = document.getElementById('art-img');
                    if (data.albumArt) {
                        artImg.src = data.albumArt;
                        artImg.style.display = 'block';
                    }
                    if (data.duration > 0) {
                        document.getElementById('sBar').style.width = (data.progress / data.duration * 100) + "%";
                    }
                } catch(e) {}
            }

            if(topic === "room/memo/list") { try { renderMemos(JSON.parse(payload)); } catch(e) {} }
        };

        function renderMemos(memos) {
            var container = document.getElementById('notes');
            container.innerHTML = "";
            for (var i = 0; i < memos.length; i++) {
                var note = document.createElement('div');
                note.className = 'sticky-note';
                note.innerHTML = memos[i].text;
                container.appendChild(note);
            }
        }

        cli.connect({ onSuccess: onConn, useSSL: false });
    </script>
</body>
</html>
